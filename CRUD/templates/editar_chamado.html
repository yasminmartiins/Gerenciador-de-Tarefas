<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='CSS/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='CSS/editar.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Editar Tarefa</title>
</head>
<body>
    <header>
        <a href="{{ url_for('index') }}" class="bt_home"><i class="fas fa-home"></i></a>
        <span class="texto_logo">EDITAR TAREFA</span>
    </header>
    <div class="cnt_formulario">
        <form method="POST">
            <label>Funcionário:</label>
            <select name="funcionario" required>
                {% for nome in funcionarios %}
                <option value="{{ nome }}" {% if nome == tarefa['funcionario'] %}selected{% endif %}>
                    {{ nome }}
                </option>
                {% endfor %}
            </select>

            <label>Função:</label>
            <select name="funcao">
                {% for nome in funcoes %}
                <option value="{{ nome }}" {% if nome == tarefa['funcao'] %}selected{% endif %}>
                    {{ nome }}
                </option>
                {% endfor %}
            </select>

            <label>Título da Tarefa:</label>
            <input name="titulo" type="text" value="{{ tarefa['titulo'] }}" placeholder="Ex: Manutenção Geral" required>

            <label>Descrição:</label>
            <textarea name="descricao" rows="6" placeholder="Descreva os detalhes..." required>{{ tarefa['descricao'] }}</textarea>

            <label for="sala_id">Reservar Sala (Opcional):</label>
            <select name="sala_id" id="sala_id">
                <option value="">Nenhuma sala necessária</option>
                {% for sala in salas %}
                    <option value="{{ sala.id }}" 
                        {% if tarefa['sala_id'] and sala.id|int == tarefa['sala_id']|int %} 
                            selected 
                        {% elif sala.status == 'Indisponível' %} 
                            disabled 
                        {% endif %}>
                        
                        {{ sala.nome }} 
                        {% if sala.status == 'Indisponível' and (not tarefa['sala_id'] or sala.id|int != tarefa['sala_id']|int) %} 
                            (OCUPADA) 
                        {% endif %}
                    </option>
                {% endfor %}
            </select>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div>
                    <label>Prioridade:</label>
                    <select name="prioridade">
                        <option value="baixa" {% if tarefa['prioridade'] == 'baixa' %}selected{% endif %}>Baixa</option>
                        <option value="media" {% if tarefa['prioridade'] == 'media' %}selected{% endif %}>Média</option>
                        <option value="alta" {% if tarefa['prioridade'] == 'alta' %}selected{% endif %}>Alta</option>
                    </select>
                </div>
                <div>
                    <label>Registrado por (Gestor):</label>
                    <select name="gestor" required>
                        {% for nome in gestores %}
                        <option value="{{ nome }}" {% if nome == tarefa['gestor'] %}selected{% endif %}>
                            {{ nome }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="cnt_bt">
                <a href="{{ url_for('status') }}" class="bt_cancelar">CANCELAR</a>
                <button type="submit" class="bt_primario">SALVAR ALTERAÇÕES</button>
            </div>
        </form>
    </div>
</body>
</html>
