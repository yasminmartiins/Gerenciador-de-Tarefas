<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='CSS/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='CSS/modal_status.css') }}">
    <title>Modal Visualizar Chamados</title>
</head>
<body>
    <div id="modal_detalhes" class="modal_kanban">
        <div class="conteudo_modal">
            <span class="fechar_modal" onclick="fecharModal()">&times;</span>
            
            <div class="header_modal">
                <h2 id="modal_titulo">Título da Tarefa</h2>
            </div>

            <div class="modal_layout_duas_colunas">
                
                <div class="coluna_esquerda">
                    <div class="secao_modal">
                        <label><i class="fas fa-align-left"></i> Descrição</label>
                        <div id="modal_descricao" class="texto_descricao" style="margin-top: 15px;"></div>
                    </div>

                    <div class="grid_detalhes">
                        <div class="item_detalhe">
                            <label>Funcionário</label>
                            <p id="modal_func"></p>
                        </div>
                        <div class="item_detalhe">
                            <label>Gestor Responsável</label>
                            <p id="modal_gestor"></p>
                        </div>
                    </div>

                    <div class="item_detalhe">
                        <label>Função</label>
                        <p id="modal_setor" style="margin-bottom: 20px"></p>
                    </div>

                    <div class="secao_modal">
                        <label><i class="fas fa-paperclip"></i> Anexos</label>
                        <div style="margin-top: 20px;">
                            <div class="topo_lista"></div>
                            <div id="lista_anexos" class="lista_anexos"></div>
                        </div>
                        <div class="area_upload_moderna" onclick="document.getElementById('input_file').click()">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <p>Anexar arquivos</p>
                            <input type="file" id="input_file" style="display:none" onchange="adicionarAnexo(this)">
                        </div>
                    </div>
                </div>

                <div class="coluna_direita">
                    <div class="secao_modal">
                        <label><i class="fas fa-comments"></i> Comentários</label>
                        <div class="input_grupo">
                            <textarea id="novo_comentario" placeholder="Escreva um comentário..."></textarea>
                            <button class="bt_comentar" onclick="adicionarComentario()">Enviar</button>
                        </div>

                        <div style="margin-top: 20px;">
                            <div class="topo_lista"></div>
                            <div id="lista_comentarios" class="lista_comentarios"></div>
                        </div>
                    </div>
                </div>
            </div> 
        </div>
    </div>

    <div id="modal_preview" class="modal_kanban" onclick="fecharPreview()">
        <div class="conteudo_preview" onclick="event.stopPropagation()">
            <span class="fechar_modal" onclick="fecharPreview()" style="top: 10px; right: 20px;">&times;</span>
            
            <div id="container_preview">
                </div>

            <div class="footer_preview">
                <span id="nome_arquivo_preview" style="color: #888; font-size: 0.9rem;"></span>
                <a id="link_download_direto" href="#" download class="bt_comentar">
                    <i class="fas fa-download"></i> Baixar Original
                </a>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='JavaScript/modal-status.js') }}"></script>
</body>
</html>
