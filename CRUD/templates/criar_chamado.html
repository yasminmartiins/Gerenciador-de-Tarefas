<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='CSS/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='CSS/criar.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Nova Tarefa</title>
</head>
<body>
    <header>
        <a href="{{ url_for('index') }}" class="bt_home"><i class="fas fa-home"></i></a>
        <span class="texto_logo">ABRIR TAREFA</span>
    </header>
    <div class="cnt_formulario">
        <form method="POST">
            <label>Funcionário:</label>
            <select name="funcionario" required>
                {% for nome in funcionarios %}
                <option value="{{ nome }}">{{ nome }}</option>
                {% endfor %}
            </select>

            <label>Função:</label>
            <select name="funcao">
                {% for nome in funcoes %}
                <option value="{{ nome }}">{{ nome }}</option>
                {% endfor %}
            </select>

            <label>Título da Tarefa:</label>
            <input name="local" type="text" placeholder="Ex: Criar nova Tarefa" required>

            <label>Descrição:</label>
            <textarea name="tarefa" rows="6" placeholder="Descreva os detalhes..." required></textarea>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div>
                    <label>Prioridade:</label>
                    <select name="prioridade">
                        <option value="baixa" selected>Baixa</option>
                        <option value="media">Média</option>
                        <option value="alta">Alta</option>
                    </select>
                </div>
                <div>
                    <label>Registrado por (Gestor):</label>
                    <select name="gestor" required>
                        {% for nome in gestores %}
                        <option value="{{ nome }}">{{ nome }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            
            <div class="cnt_bt">
                <button type="submit" class="bt_primario">SALVAR TAREFA</button>
            </div>
        </form>
    </div>
</body>
</html>
