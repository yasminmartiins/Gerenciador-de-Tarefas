<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='CSS/cadastrar.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Login</title>
</head>
<body>
    <div class="cnt_principal fundo">
        <h2>Faça o seu Cadastro</h2>
        <form action="index.html" method="post" class="forms">
            <label for="nome">Nome sobrenome:</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome e sobrenome">

            <label for="rg">RG:</label>
            <input type="text" id="rg" name="rg" placeholder="Digite o número do seu RG">

            <label for="cpf">CPF:</label>
            <input type="text" id="cpf" name="cpf" placeholder="Digite o número do seu CPF">

            <label for="tel">Tel.:</label>
            <input type="text" id="tel" name="tel" placeholder="Digite o número do seu telefone">

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Digite seu email">
            
            <label for="senha">Senha:</label>
            <input type="text" id="senha" name="senha" placeholder="Digite sua senha">

            <label for="status">Status:</label>
            <input type="text" id="status" name="status" placeholder="Digite seu status">

            <label for="cargo">Cargo:</label>
            <input type="text" id="cargo" name="cargo" placeholder="Digite seu cargo">

            <div class="botao">
                <button type="submit">Entrar</button>
            </div>
            
            <p>Já possui conta? <a href="{{ url_for('login') }}">Faça Login</a></p>
        </form>
    </div>
</body>
</html>
